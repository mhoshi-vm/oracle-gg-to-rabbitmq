version: '3.8'

services:
  # 1. Source Database: Oracle DB Free
  oracledb:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-db
    environment:
      - ORACLE_PWD=OraclePassword1!
      - ENABLE_ARCHIVELOG=true       # Automatically enable ArchiveLog mode
      - ENABLE_FORCE_LOGGING=true    # Automatically enable Force Logging
    volumes:
      # Mount the setup script so it runs on initial DB creation
      - ./oracle_config/01_setup_cdc.sql:/opt/oracle/scripts/setup/01_setup_cdc.sql
    networks:
      - gg_network

  # 2. Target Message Broker: RabbitMQ 4.3
  rabbitmq:
    image: rabbitmq:4.3-management
    container_name: rabbitmq
    ports:
      - "15672:15672" # Management UI
    volumes:
      - ./enabled_plugins:/etc/rabbitmq/enabled_plugins
      - ./rabbitmq_config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./rabbitmq_config/definitions.json:/etc/rabbitmq/definitions.json
    networks:
      - gg_network

  # NEW: The Capture Engine (GoldenGate for Oracle Database)
  gg-capture:
    image: container-registry.oracle.com/goldengate/goldengate-oracle-free:latest
    platform: linux/amd64
    container_name: gg-capture
    environment:
      - OGG_ADMIN=oggadmin
      - OGG_ADMIN_PWD=Welcome#12345
    ports:
      - "8444:8443" # Exposed on port 8444 to avoid conflict
    volumes:
      - shared_trails:/u02/trails # Shared folder to dump the trail files
    depends_on:
      - oracledb
    networks:
      - gg_network

  # EXISTING: The Delivery Engine (GoldenGate for DAA / RabbitMQ)
  gg-delivery:
    image: container-registry.oracle.com/goldengate/goldengate-distributed-apps-and-analytics:latest
    platform: linux/amd64
    container_name: gg-daa
    environment:
      - OGG_ADMIN=oggadmin
      - OGG_ADMIN_PWD=Welcome#12345
    ports:
      - "8443:8443" # Exposed on port 8443
    volumes:
      - ./gg_jars:/u02/jars
      - ./gg_config:/u02/config
      - shared_trails:/u02/trails # Shared folder to read the trail files
    depends_on:
      - rabbitmq
    networks:
      - gg_network

volumes:
  # The bridge between the two GoldenGate containers
  shared_trails:

networks:
  gg_network:
    driver: bridge